<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d1b2a;
            /* Navy Dark Blue */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            color: white;
            overflow: hidden;
            user-select: none;
        }

        .container {
            text-align: center;
            animation: fadeIn 1s ease-in;
        }

        h1 {
            font-size: 2.2rem;
            margin: 10px 0 5px 0;
            letter-spacing: 1px;
            text-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        p {
            font-size: 0.9rem;
            color: #ccc;
            margin-top: 5px;
            font-style: italic;
        }

        .loader {
            margin: 15px auto 0;
            width: 200px;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }

        .bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: #d4af37;
            width: 50%;
            animation: load 1.5s infinite linear;
        }

        @keyframes load {
            0% {
                left: -100%;
                width: 50%;
            }

            50% {
                left: 25%;
                width: 50%;
            }

            100% {
                left: 100%;
                width: 50%;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .loading-text {
            margin-top: 10px;
            font-size: 0.7rem;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <div class="container">
        <img src="logo.png" alt="Logo" style="width: 80px; height: 80px; margin-bottom: 10px; object-fit: contain;">
        <h1>ASAS look cashier POS</h1>
        <p style="margin: 0;">Powered by ASAS Software Solutions v3.0</p>

        <div class="loader">
            <div class="bar"></div>
        </div>
        <div class="loading-text">Loading System Resources...</div>
    </div>
</body>

</html>
